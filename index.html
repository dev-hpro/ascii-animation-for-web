<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23000'/%3E%3Ctext x='2' y='12' font-family='monospace' font-size='11' fill='%2300ff41'%3E%40%3C/text%3E%3C/svg%3E">
<title>ASCII Studio</title>
<style>
  :root { --verde: #00ff41; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: var(--verde);
    font-family: "Cascadia Mono", "JetBrains Mono", "Fira Mono", monospace;
    overflow: hidden;
  }
  #tela {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #frame {
    margin: 0;
    white-space: pre;
    line-height: 1;
    color: var(--verde);
    text-shadow: 0 0 6px color-mix(in srgb, var(--verde) 45%, transparent);
  }

  /* barra inferior */
  #controles {
    position: fixed;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    max-width: calc(100vw - 16px);
    box-sizing: border-box;
    gap: 12px;
    align-items: center;
    padding: 10px 18px;
    background: rgba(0, 20, 5, .88);
    border: 1px solid var(--verde);
    border-radius: 8px;
    font-size: 13px;
    user-select: none;
    transition: opacity .4s;
    z-index: 5;
  }
  #controles.oculto { opacity: 0; pointer-events: none; }
  #controles label { display: flex; align-items: center; gap: 6px; }
  @media (max-width: 600px) {
    #controles {
      bottom: 8px;
      gap: 8px;
      padding: 8px 10px;
      font-size: 12px;
    }
    #controles input[type=range] { width: min(38vw, 130px); }
    #status { min-width: 0; text-align: center; }
  }

  /* painel de configuração */
  #painel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(300px, 100vw);
    box-sizing: border-box;
    padding: 18px;
    background: rgba(0, 15, 4, .96);
    border-left: 1px solid var(--verde);
    font-size: 13px;
    overflow-y: auto;
    z-index: 10;
    transition: transform .25s;
  }
  #painel.fechado { transform: translateX(100%); }
  #painel h2 { margin: 0 0 14px; font-size: 15px; }
  #painel label { display: block; margin: 12px 0 4px; opacity: .9; }
  #painel .dica { font-size: 11px; opacity: .55; margin-top: 2px; }
  #painel input[type=number], #painel input[type=text], #painel select {
    width: 100%;
    box-sizing: border-box;
    background: #000;
    color: var(--verde);
    border: 1px solid var(--verde);
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    padding: 5px 7px;
  }
  #painel input[type=color] {
    width: 100%;
    height: 30px;
    background: #000;
    border: 1px solid var(--verde);
    border-radius: 4px;
    padding: 2px;
  }
  #painel .linha { display: flex; gap: 8px; align-items: center; }
  #painel .linha label { margin: 0; }
  button {
    background: none;
    border: 1px solid var(--verde);
    color: var(--verde);
    font-family: inherit;
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover { background: var(--verde); color: #000; }
  button.destaque { background: var(--verde); color: #000; font-weight: bold; }
  button.destaque:hover { filter: brightness(1.2); }
  #painel button { width: 100%; margin-top: 8px; }
  input[type=range] { accent-color: var(--verde); width: 130px; }
  #btnPainel {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 11;
  }
  #credito {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 11;
    color: var(--verde);
    font-size: 13px;
    text-decoration: none;
    opacity: .65;
  }
  #credito:hover { opacity: 1; text-decoration: underline; }
  #status { min-width: 110px; text-align: right; }
  #soltar {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 40, 10, .7);
    border: 3px dashed var(--verde);
    font-size: 26px;
    z-index: 20;
    pointer-events: none;
  }
  body.arrastando #soltar { display: flex; }
</style>
</head>
<body>
<div id="tela"><pre id="frame">carregando…</pre></div>
<div id="soltar">solte as imagens aqui</div>

<a id="credito" href="https://henrique.pro/toolz" target="_blank" rel="noopener">henrique.pro/toolz</a>

<button id="btnPainel">⚙ config</button>

<div id="painel" class="fechado">
  <h2>⚙ Configuração</h2>

  <button id="btnImagens">📂 escolher imagens…</button>
  <div class="dica">ou arraste os PNGs pra tela · ordem natural dos nomes</div>
  <input type="file" id="arquivos" accept="image/*" multiple hidden>

  <label>largura (chars por linha)</label>
  <input type="number" id="cfgLargura" min="20" max="800" step="10" value="400">
  <div class="dica">mais chars = mais densidade/detalhe</div>

  <label>altura (linhas)</label>
  <input type="number" id="cfgAltura" min="0" max="400" step="1" value="0">
  <div class="dica">0 = automática pela proporção da imagem</div>

  <label>mapa de caracteres (escuro → claro)</label>
  <input type="text" id="cfgMapa" value="@%#*+=:-. ">
  <label>preset</label>
  <select id="cfgPreset">
    <option value="@%#*+=:-. ">padrão @%#*+=:-.␣</option>
    <option value="█▓▒░ ">blocos █▓▒░␣</option>
    <option value="@#S%?*+;:,. ">detalhado</option>
    <option value="#. ">mínimo #.␣</option>
    <option value="01 ">binário 01␣</option>
  </select>

  <div class="linha" style="margin-top:12px">
    <input type="checkbox" id="cfgNegativo">
    <label for="cfgNegativo">negativo (fundo escuro na imagem)</label>
  </div>

  <label>cor das letras</label>
  <input type="color" id="cfgCor" value="#00ff41">

  <button id="btnConverter" class="destaque">↻ reconverter</button>
  <button id="btnExportar">⬇ gerar HTML estático</button>
  <div class="dica" id="infoExporta">o HTML gerado é um arquivo único com a animação embutida</div>
</div>

<div id="controles">
  <button id="btnPlay">⏸ pausa</button>
  <button id="btnAnt">⏮</button>
  <button id="btnProx">⏭</button>
  <label>fps <input type="range" id="fps" min="1" max="30" step="1" value="8"></label>
  <span id="fpsVal">8</span>
  <span id="status">—</span>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const elFrame = $('frame'), elStatus = $('status');

  // ---------- estado ----------
  let imagens = [];       // [{nome, file}] carregadas pelo usuário
  let frames = [];        // frames ASCII em exibição
  let atual = 0, tocando = true, fps = 8, timer = null;

  // id de sessão: isola o cache de imagens deste navegador no servidor
  const sessao = (crypto.randomUUID && crypto.randomUUID()) ||
    ('s-' + Date.now() + '-' + Math.random().toString(36).slice(2));

  // A conversão é sempre feita no servidor (servidor.js + binário ascii-image-converter).
  let servidor = false;
  let limites = null;  // { maxArquivos, maxTamanhoKb } informados pelo servidor
  let enviadas = false; // imagens já estão no cache do servidor?
  const pingPronto = location.protocol.startsWith('http')
    ? fetch('api/ping').then(r => r.json())
        .then(j => { servidor = !!(j.ok && j.conversor); limites = j.limites || null; })
        .catch(() => {})
    : Promise.resolve();

  // ---------- animação ----------
  function mostrar() {
    if (!frames.length) return;
    elFrame.textContent = frames[atual];
    elStatus.textContent = `frame ${atual + 1}/${frames.length}`;
  }
  function passo(d = 1) {
    if (!frames.length) return;
    atual = (atual + d + frames.length) % frames.length;
    mostrar();
  }
  function agendar() {
    clearInterval(timer);
    if (tocando && frames.length > 1) timer = setInterval(passo, 1000 / fps);
  }
  function alternar() {
    tocando = !tocando;
    $('btnPlay').textContent = tocando ? '⏸ pausa' : '▶ play';
    agendar();
  }

  // ---------- ajuste de fonte pra caber na tela ----------
  function ajustar() {
    if (!frames.length) return;
    const linhas = frames[0].replace(/\n$/, '').split('\n');
    const nL = linhas.length, nC = Math.max(...linhas.map(l => l.length));
    const m = document.createElement('pre');
    m.style.cssText = 'position:absolute;visibility:hidden;font:100px ' +
      getComputedStyle(elFrame).fontFamily + ';line-height:1;margin:0';
    m.textContent = 'M';
    document.body.appendChild(m);
    const prop = m.getBoundingClientRect().width / 100;
    m.remove();
    const tam = Math.min(innerHeight / nL, innerWidth / (nC * prop));
    elFrame.style.fontSize = Math.max(1, Math.floor(tam * 100) / 100) + 'px';
  }
  addEventListener('resize', ajustar);

  function lerCfg() {
    let mapa = $('cfgMapa').value;
    if (mapa.length < 2) mapa = '@ ';
    return {
      largura: Math.max(20, +$('cfgLargura').value || 400),
      altura: Math.max(0, +$('cfgAltura').value || 0),
      mapa,
      negativo: $('cfgNegativo').checked,
    };
  }

  function paraB64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  function empacotar() {
    return Promise.all(
      imagens.map(async im => ({ nome: im.nome, b64: await paraB64(im.file) }))
    );
  }

  function enviarConversao(payload) {
    return fetch('api/converter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessao, ...payload }),
    });
  }

  // ---------- animação salva neste navegador (IndexedDB) ----------
  // A última animação criada fica só aqui, no navegador do usuário —
  // o servidor não guarda nada.
  function abrirBD() {
    return new Promise((res, rej) => {
      const rq = indexedDB.open('ascii-studio', 1);
      rq.onupgradeneeded = () => rq.result.createObjectStore('animacoes');
      rq.onsuccess = () => res(rq.result);
      rq.onerror = () => rej(rq.error);
    });
  }
  async function salvarLocal() {
    if (!frames.length) return;
    try {
      const bd = await abrirBD();
      await new Promise((res, rej) => {
        const tx = bd.transaction('animacoes', 'readwrite');
        tx.objectStore('animacoes').put(
          { frames, fps, cor: $('cfgCor').value, cfg: lerCfg() }, 'ultima');
        tx.oncomplete = res;
        tx.onerror = () => rej(tx.error);
      });
      bd.close();
    } catch {}
  }
  async function carregarLocal() {
    try {
      const bd = await abrirBD();
      const dados = await new Promise((res, rej) => {
        const rq = bd.transaction('animacoes').objectStore('animacoes').get('ultima');
        rq.onsuccess = () => res(rq.result);
        rq.onerror = () => rej(rq.error);
      });
      bd.close();
      return dados;
    } catch { return null; }
  }

  let convertendo = false;
  async function reconverter() {
    if (!imagens.length) {
      elStatus.textContent = frames.length
        ? 'carregue as imagens de novo pra reconverter'
        : 'sem imagens';
      return;
    }
    if (convertendo) return;
    convertendo = true;
    const cfg = lerCfg();
    try {
      if (!servidor) {
        throw new Error('servidor de conversão indisponível — abra a página pelo servidor.js');
      }
      // conversão pesada no servidor.js (binário ascii-image-converter);
      // as imagens só são enviadas na primeira vez, ajustes reusam o cache
      elStatus.textContent = 'convertendo (servidor)…';
      const payload = { cfg };
      if (!enviadas) payload.imagens = await empacotar();
      let r = await enviarConversao(payload);
      if (r.status === 400 && !payload.imagens) {
        // servidor reiniciou e perdeu o cache — re-envia as imagens uma vez
        enviadas = false;
        r = await enviarConversao({ cfg, imagens: await empacotar() });
      }
      const j = await r.json();
      if (!r.ok) throw new Error(j.erro || r.status);
      enviadas = true;
      frames = j.frames;
      atual = 0;
      ajustar();
      mostrar();
      agendar();
      salvarLocal();
    } catch (e) {
      elStatus.textContent = 'erro: ' + e.message;
    } finally {
      convertendo = false;
    }
  }

  // ---------- compressão no navegador ----------
  // Arquivo acima do limite do servidor? O navegador redimensiona e reencoda
  // em JPEG até caber — a conversão ASCII usa no máximo 800 colunas, então dá
  // pra reduzir bastante sem perder detalhe visível no resultado.
  function criarCanvas(w, h) {
    if (typeof OffscreenCanvas !== 'undefined') return new OffscreenCanvas(w, h);
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    return c;
  }
  function lerBitmap(file) {
    if (typeof createImageBitmap === 'function') return createImageBitmap(file);
    return new Promise((res, rej) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => { URL.revokeObjectURL(url); res(img); };
      img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('falha ao ler ' + file.name)); };
      img.src = url;
    });
  }
  function paraBlob(cv, qualidade) {
    if (cv.convertToBlob) return cv.convertToBlob({ type: 'image/jpeg', quality: qualidade });
    return new Promise(res => cv.toBlob(res, 'image/jpeg', qualidade));
  }
  async function comprimir(file, maxB) {
    const bm = await lerBitmap(file);
    const bw = bm.width || bm.naturalWidth, bh = bm.height || bm.naturalHeight;
    const larguraBase = Math.min(bw, 1600);
    for (const escala of [1, 0.7, 0.5, 0.35, 0.25, 0.15]) {
      const w = Math.max(1, Math.round(larguraBase * escala));
      const h = Math.max(1, Math.round(w * bh / bw));
      const cv = criarCanvas(w, h);
      const cx = cv.getContext('2d');
      cx.fillStyle = '#fff'; // JPEG não tem transparência: fundo branco
      cx.fillRect(0, 0, w, h);
      cx.drawImage(bm, 0, 0, w, h);
      for (const q of [0.8, 0.6, 0.4]) {
        const blob = await paraBlob(cv, q);
        if (blob.size <= maxB) return blob;
      }
    }
    throw new Error(`não deu pra comprimir "${file.name}" abaixo do limite`);
  }

  // ---------- carregamento de imagens ----------
  const ordemNatural = (a, b) =>
    a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });

  async function carregar(files) {
    const lista = [...files].filter(f => f.type.startsWith('image/')).sort(ordemNatural);
    if (!lista.length) return;
    await pingPronto; // garante que os limites do servidor já chegaram
    if (limites && lista.length > limites.maxArquivos) {
      elStatus.textContent = `erro: máximo de ${limites.maxArquivos} arquivos por conversão`;
      return;
    }
    const maxB = limites ? limites.maxTamanhoKb * 1024 : Infinity;
    try {
      const novas = [];
      for (let i = 0; i < lista.length; i++) {
        const f = lista[i];
        if (f.size > maxB) {
          elStatus.textContent = `comprimindo ${i + 1}/${lista.length} (${f.name})…`;
          novas.push({ nome: f.name.replace(/\.[^.]+$/, '') + '.jpg', file: await comprimir(f, maxB) });
        } else {
          novas.push({ nome: f.name, file: f });
        }
      }
      imagens = novas;
    } catch (e) {
      elStatus.textContent = 'erro: ' + e.message;
      return;
    }
    enviadas = false;
    reconverter();
    $('painel').classList.remove('fechado');
  }

  $('btnImagens').onclick = () => $('arquivos').click();
  $('arquivos').onchange = e => carregar(e.target.files);

  addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('arrastando'); });
  addEventListener('dragleave', e => { if (!e.relatedTarget) document.body.classList.remove('arrastando'); });
  addEventListener('drop', e => {
    e.preventDefault();
    document.body.classList.remove('arrastando');
    carregar(e.dataTransfer.files);
  });

  // ---------- painel ----------
  $('btnPainel').onclick = () => $('painel').classList.toggle('fechado');
  $('btnConverter').onclick = reconverter;
  $('cfgPreset').onchange = e => { $('cfgMapa').value = e.target.value; reconverter(); };
  let debSalvar = null;
  const salvarDepois = () => { clearTimeout(debSalvar); debSalvar = setTimeout(salvarLocal, 500); };
  $('cfgCor').oninput = e => {
    document.documentElement.style.setProperty('--verde', e.target.value);
    salvarDepois();
  };
  // reconversão automática ao mudar valores (com um pequeno atraso)
  let deb = null;
  ['cfgLargura', 'cfgAltura', 'cfgMapa'].forEach(id =>
    $(id).addEventListener('input', () => { clearTimeout(deb); deb = setTimeout(reconverter, 400); }));
  $('cfgNegativo').onchange = reconverter;

  // ---------- exportar HTML estático ----------
  $('btnExportar').onclick = () => {
    if (!frames.length) { alert('Nada pra exportar — carregue imagens primeiro.'); return; }
    const cor = $('cfgCor').value;
    const html = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Animação ASCII</title>
<style>
html,body{margin:0;height:100%;background:#000;color:${cor};font-family:"Cascadia Mono","JetBrains Mono","Fira Mono",monospace;overflow:hidden}
#t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#f{margin:0;white-space:pre;line-height:1;text-shadow:0 0 6px ${cor}73}
</style>
</head>
<body>
<div id="t"><pre id="f"></pre></div>
<script>
var FRAMES=${JSON.stringify(frames)};
var FPS=${fps};
(function(){
var el=document.getElementById('f'),i=0,tocando=true,timer=null;
var ls=FRAMES[0].replace(/\\n$/,'').split('\\n'),nL=ls.length,nC=0;
for(var k=0;k<ls.length;k++)if(ls[k].length>nC)nC=ls[k].length;
function ajustar(){
var m=document.createElement('pre');
m.style.cssText='position:absolute;visibility:hidden;font:100px '+getComputedStyle(el).fontFamily+';line-height:1;margin:0';
m.textContent='M';document.body.appendChild(m);
var p=m.getBoundingClientRect().width/100;m.remove();
el.style.fontSize=Math.max(1,Math.min(innerHeight/nL,innerWidth/(nC*p)))+'px';
}
function passo(d){i=(i+(d||1)+FRAMES.length)%FRAMES.length;el.textContent=FRAMES[i];}
function agendar(){clearInterval(timer);if(tocando&&FRAMES.length>1)timer=setInterval(passo,1000/FPS);}
addEventListener('resize',ajustar);
addEventListener('keydown',function(e){
if(e.code==='Space'){e.preventDefault();tocando=!tocando;agendar();}
else if(e.key==='ArrowRight'){tocando=false;agendar();passo(1);}
else if(e.key==='ArrowLeft'){tocando=false;agendar();passo(-1);}
else if(e.key==='ArrowUp'){FPS=Math.min(60,FPS+1);agendar();}
else if(e.key==='ArrowDown'){FPS=Math.max(1,FPS-1);agendar();}
else if(e.key.toLowerCase()==='f'&&document.documentElement.requestFullscreen)document.documentElement.requestFullscreen();
});
ajustar();el.textContent=FRAMES[0];agendar();
})();
<\/script>
</body>
</html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'animacao-ascii.html';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // ---------- barra inferior + teclado ----------
  $('btnPlay').onclick = alternar;
  $('btnAnt').onclick = () => { if (tocando) alternar(); passo(-1); };
  $('btnProx').onclick = () => { if (tocando) alternar(); passo(1); };
  $('fps').oninput = e => { fps = +e.target.value; $('fpsVal').textContent = fps; agendar(); salvarDepois(); };

  addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.code === 'Space') { e.preventDefault(); alternar(); }
    else if (e.key === 'ArrowRight') { if (tocando) alternar(); passo(1); }
    else if (e.key === 'ArrowLeft') { if (tocando) alternar(); passo(-1); }
    else if (e.key === 'ArrowUp') { $('fps').value = Math.min(30, fps + 1); $('fps').oninput({ target: $('fps') }); }
    else if (e.key === 'ArrowDown') { $('fps').value = Math.max(1, fps - 1); $('fps').oninput({ target: $('fps') }); }
    else if (e.key.toLowerCase() === 'f') document.documentElement.requestFullscreen?.();
    else if (e.key.toLowerCase() === 'c') $('btnPainel').onclick();
  });

  // barra some com mouse/toque parado (e volta com movimento ou toque)
  const controles = $('controles');
  let sumir = setTimeout(() => controles.classList.add('oculto'), 2500);
  const acordar = () => {
    controles.classList.remove('oculto');
    clearTimeout(sumir);
    sumir = setTimeout(() => controles.classList.add('oculto'), 2500);
  };
  addEventListener('mousemove', acordar);
  addEventListener('touchstart', acordar, { passive: true });

  // ---------- início ----------
  // animação de exemplo (frames.js), carregada sob demanda pra não travar a página
  function carregarDemo() {
    return new Promise(res => {
      const s = document.createElement('script');
      s.src = 'frames.js';
      s.onload = () => res(Array.isArray(window.FRAMES) ? window.FRAMES : []);
      s.onerror = () => res([]);
      document.head.appendChild(s);
    });
  }

  // restaura a última animação criada NESTE navegador; usuário novo vê a demo
  (async () => {
    const salvo = await carregarLocal();
    if (salvo && Array.isArray(salvo.frames) && salvo.frames.length && !frames.length) {
      frames = salvo.frames;
      if (salvo.fps >= 1) {
        fps = Math.min(30, Math.round(salvo.fps));
        $('fps').value = fps;
        $('fpsVal').textContent = fps;
      }
      if (salvo.cor) {
        $('cfgCor').value = salvo.cor;
        document.documentElement.style.setProperty('--verde', salvo.cor);
      }
      if (salvo.cfg) {
        $('cfgLargura').value = salvo.cfg.largura;
        $('cfgAltura').value = salvo.cfg.altura;
        $('cfgMapa').value = salvo.cfg.mapa;
        $('cfgNegativo').checked = !!salvo.cfg.negativo;
      }
      ajustar();
      mostrar();
      agendar();
    } else if (!frames.length) {
      elFrame.textContent = 'carregando exemplo…';
      elFrame.style.fontSize = '20px';
      const demo = await carregarDemo();
      if (demo.length && !frames.length && !imagens.length) {
        frames = demo;
        ajustar();
        mostrar();
        agendar();
      } else if (!frames.length) {
        elFrame.textContent =
          'ASCII Studio\n\n' +
          'Arraste imagens pra cá ou use ⚙ config → escolher imagens.\n' +
          'Ajuste largura, mapa de chars, cor…\n' +
          'Depois gere um HTML estático com a animação.';
      }
    }
  })();
})();
</script>
</body>
</html>
